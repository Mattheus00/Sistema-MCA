# Blueprint Render — monorepo TCC (backend em Backend/)
# Frontend na Vercel: VITE_API_URL=https://<sgi-backend>.onrender.com

services:
  - type: web
    name: sgi-backend
    rootDir: Backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    disk:
      name: sgi-data
      mountPath: /var/data
      sizeGB: 1
    healthCheckPath: /health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        value: jdbc:sqlite:/var/data/sgi.db
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        sync: false
