# Perfil "local" carrega application-local.properties (chaves, overrides). Desative em produção.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Render injeta PORT; SERVER_PORT mantém compatibilidade local
server.port=${PORT:${SERVER_PORT:8080}}

# Database SQLite (Hibernate cria/atualiza tabelas automaticamente)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:sqlite:./data/sgi.db}
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging Hibernate (útil para desenvolvimento)
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Security JWT
jwt.secret=${JWT_SECRET:MeuSecretSuperSeguroParaSGI2025Minimo256BitsParaHS256}
jwt.expiration=86400000

# Email (fallback - pode ser sobrescrito por EmailConfig no banco)
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER:}
spring.mail.password=${SMTP_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# CORS (produção: CORS_ALLOWED_ORIGINS=https://seu-app.vercel.app)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# Scheduler
scheduler.enabled=true
scheduler.dividas-vencidas.cron=0 0 1 * * ?
scheduler.agendamentos.cron=0 */30 * * * ?
scheduler.email-retry.cron=0 */15 * * * ?

# Produção local: seed e recuperação pública ligados (dev/TCC). Em prod, application-prod desliga.
sgi.seed.enabled=true
sgi.seed.reset-passwords=false
sgi.auth.password-recovery-enabled=true
sgi.email.max-tentativas=5

# Gemini (Reforma Tributária - consulta IA). Use variável de ambiente GEMINI_API_KEY.
gemini.api.key=${GEMINI_API_KEY:}
# Modelo (padrão: gemini-2.5-flash). Outros: gemini-2.5-pro, gemini-2.5-flash-lite, gemini-3-flash-preview
gemini.model=${GEMINI_MODEL:gemini-2.5-flash}

# SpringDoc
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Nome exibido no cabeçalho dos e-mails de cobrança (HTML).
cobranca.email.nome-escritorio=${COBRANCA_EMAIL_ESCRITORIO:Contabilidade São Judas Tadeu}

# Consulta CNPJ (gov.br / Conecta)
cnpj.api.base-url=${CNPJ_API_BASE_URL:https://apigateway.conectagov.estaleiro.serpro.gov.br/api-cnpj-empresa/v2/empresa}
# Header exigido pela API oficial (x-cpf-usuario)
cnpj.api.cpf-usuario=${CNPJ_API_CPF_USUARIO:}
# Token OAuth/Bearer para acesso a API oficial (quando exigido)
cnpj.api.bearer-token=${CNPJ_API_BEARER_TOKEN:}
# Fallback publico sem autenticacao (usado quando gov.br indisponivel)
cnpj.api.brasil.base-url=${CNPJ_API_BRASIL_BASE_URL:https://brasilapi.com.br/api/cnpj/v1}
# Timeouts da consulta CNPJ (ms) para evitar travar a UI.
cnpj.api.connect-timeout-ms=${CNPJ_API_CONNECT_TIMEOUT_MS:5000}
cnpj.api.read-timeout-ms=${CNPJ_API_READ_TIMEOUT_MS:8000}

# Sicoob — Cobrança Bancária v3 + Pix recebimentos (https://developers.sicoob.com.br/portal/apis)
# Client ID do app "SGI API DE COBRANÇA" no portal (pode sobrescrever com SICOOB_CLIENT_ID).
# Para API real: SICOOB_ENABLED=true, SICOOB_MOCK=false, certificado A1 (.pfx) + senha.
sicoob.enabled=${SICOOB_ENABLED:true}
sicoob.mock=${SICOOB_MOCK:true}
sicoob.client-id=${SICOOB_CLIENT_ID:2b4c05f7-9a3d-45d2-a9cf-ef0caf7981cb}
sicoob.token-url=${SICOOB_TOKEN_URL:https://auth.sicoob.com.br/auth/realms/cooperado/protocol/openid-connect/token}
sicoob.pix-base-url=${SICOOB_PIX_BASE_URL:https://api.sicoob.com.br/pix/api/v2}
sicoob.cobranca-base-url=${SICOOB_COBRANCA_BASE_URL:https://api.sicoob.com.br/cobranca-bancaria/v3}
sicoob.scopes=${SICOOB_SCOPES:boletos_consulta boletos_inclusao boletos_alteracao webhooks_inclusao webhooks_consulta cob.read cob.write cobv.read pix.read webhook.read webhook.write payloadlocation.read lotecobv.write}
sicoob.certificate-path=${SICOOB_CERTIFICATE_PATH:}
sicoob.certificate-password=${SICOOB_CERTIFICATE_PASSWORD:}
sicoob.pix-chave=${SICOOB_PIX_CHAVE:}
sicoob.numero-cliente=${SICOOB_NUMERO_CLIENTE:0}
sicoob.numero-conta-corrente=${SICOOB_NUMERO_CONTA:0}
sicoob.numero-contrato-cobranca=${SICOOB_NUMERO_CONTRATO:1}
sicoob.webhook-secret=${SICOOB_WEBHOOK_SECRET:}
sicoob.webhook-url-base=${SICOOB_WEBHOOK_URL_BASE:}
# Sandbox (opcional):
# sicoob.pix-base-url=https://sandbox.sicoob.com.br/sicoob/sandbox/pix/api/v2
# sicoob.cobranca-base-url=https://sandbox.sicoob.com.br/sicoob/sandbox/cobranca-bancaria/v3
