# Perfil de produção (Render, VPS, etc.). Ative com SPRING_PROFILES_ACTIVE=prod

# SQLite persistente na Render: monte disco em /var/data e use
# SPRING_DATASOURCE_URL=jdbc:sqlite:/var/data/sgi.db

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

logging.level.root=INFO
logging.level.com.pucminas.sgi=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# Segurança operacional
sgi.seed.enabled=false
sgi.seed.reset-passwords=false
sgi.auth.password-recovery-enabled=false

# Swagger fechado em produção
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false
