# Blueprint Render — Docker + SQLite em disco persistente (/var/data)
# Monorepo: no painel Render, Root Directory = Codigo/Backend

services:
  - type: web
    name: sgi-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    disk:
      name: sgi-data
      mountPath: /var/data
      sizeGB: 1
    healthCheckPath: /health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        value: jdbc:sqlite:/var/data/sgi.db
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        sync: false
